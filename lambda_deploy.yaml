AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for Solara ETL on EC2 with EventBridge and CloudWatch'

Parameters:
  EC2InstanceId:
    Type: AWS::EC2::Instance::Id
    Description: EC2 instance ID where ETL script is deployed

  EventBridgeRuleName:
    Type: String
    Default: solara-etl-schedule
    Description: Name of the EventBridge rule

  ScheduleExpression:
    Type: String
    Default: 'cron(0 */2 * * ? *)'
    Description: 'Cron expression for EventBridge schedule (default: every 2 hours)'

  LogGroupNameParam:
    Type: String
    Default: /aws/ssm/solara-etl
    Description: CloudWatch log group name for SSM

Resources:
  SSMExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      # Removed RoleName to prevent "Entity Already Exists" errors
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: InvokeSSMCommand
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'ssm:SendCommand'
                Resource:
                  - !Sub 'arn:aws:ssm:${AWS::Region}::document/AWS-RunShellScript'
                  - !Sub 'arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:instance/${EC2InstanceId}'

  # Renamed Resource to avoid conflict with Parameter Name
  SolaraLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Ref LogGroupNameParam
      RetentionInDays: 30

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Ref EventBridgeRuleName
      Description: 'EventBridge rule to trigger Solara ETL pipeline via SSM on EC2'
      ScheduleExpression: !Ref ScheduleExpression
      State: ENABLED
      Targets:
        - Id: SolaraEtlTarget # Mandatory field added
          Arn: !Sub 'arn:aws:ssm:${AWS::Region}::document/AWS-RunShellScript'
          RoleArn: !GetAtt SSMExecutionRole.Arn
          
          # FIXED: Using Input to pass commands properly
          # USAGE: runuser -l ensures we run as ec2-user (not root) to avoid permission issues
          Input: !Sub |
            {
              "commands": [
                "runuser -l ec2-user -c 'cd /home/ec2-user/etl_project && /home/ec2-user/etl_project/venv/bin/python main.py'"
              ]
            }

          RetryPolicy:
            MaximumEventAge: 3600
            MaximumRetryAttempts: 2
          
          RunCommandParameters:
            RunCommandTargets:
              - Key: 'InstanceIds'
                Values:
                  - !Ref EC2InstanceId
            
            # Note: The existing EC2 Instance Profile needs permissions to write to this Group
            CloudWatchOutputConfig:
              CloudWatchLogGroupName: !Ref LogGroupNameParam
              CloudWatchOutputEnabled: true

Outputs:
  EventBridgeRuleArn:
    Description: ARN of the EventBridge rule
    Value: !GetAtt EventBridgeRule.Arn
    Export:
      Name: !Sub '${AWS::StackName}-EventBridgeRuleArn'

  CloudWatchLogGroupName:
    Description: CloudWatch log group name
    Value: !Ref SolaraLogGroup
    Export:
      Name: !Sub '${AWS::StackName}-LogGroup'