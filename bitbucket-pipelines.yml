# Use a Python image with pip pre-installed
# Then install AWS CLI as needed in steps
image: python:3.11

definitions:
  caches:
    pip: ~/.cache/pip

pipelines:
  default:
    - step:
        name: Validate CloudFormation Template
        caches:
          - pip
        script:
          - pip install pyyaml
          - python validate_yaml.py

    - step:
        name: Sync Code and Config to EC2
      
        trigger: automatic
        script:
          - apt-get update && apt-get install -y rsync openssh-client
          - pip install awscli
          # Configure AWS credentials for fetching the SSH key
          - export AWS_REGION=af-south-1

          # Setup SSH key for rsync
          - mkdir -p ~/.ssh
          - aws ssm get-parameter --name "/swordfish_etl/SSH_KEY_FILE" --with-decryption --query "Parameter.Value" --output text --region af-south-1 > ~/.ssh/ec2_key || true
          - |
            if [ ! -s ~/.ssh/ec2_key ]; then
              echo "Error: SSH key from SSM is empty. Cannot connect to EC2."
              exit 1
            fi
          - chmod 400 ~/.ssh/ec2_key

          # Create the .env file locally before syncing
          - |
            cat > .env <<EOF
            DB_HOST=solara.crqioqgga31u.af-south-1.rds.amazonaws.com
            DB_PORT=5432
            DB_NAME=solara
            DB_USER=tableau
            DB_PASSWORD=${DB_PASSWORD}
            CLOUDWATCH_LOG_GROUP=/aws/ssm/solara-etl
            CLOUDWATCH_LOG_STREAM=etl-pipeline
            EOF

          # Sync all project files to the EC2 instance
          - rsync -avz -e "ssh -i ~/.ssh/ec2_key -o StrictHostKeyChecking=no" --exclude='.git/' ./ ec2-user@${EC2_HOST}:/home/ec2-user/etl_project

    - step:
        name: Deploy Infrastructure & Verify
        trigger: automatic
        caches:
          - pip
        script:
          - pip install boto3 awscli
          - export AWS_REGION=af-south-1
          - python deploy_lambda.py deploy
          - echo "Waiting for CloudFormation stack to complete..."
          - aws cloudformation wait stack-create-complete --stack-name solara-etl-stack --region af-south-1 || aws cloudformation wait stack-update-complete --stack-name solara-etl-stack --region af-south-1
          - echo "Deployment successful!"
          - echo "Stack outputs:"
          - aws cloudformation describe-stacks --stack-name solara-etl-stack --region af-south-1 --query 'Stacks[0].Outputs' --output table
