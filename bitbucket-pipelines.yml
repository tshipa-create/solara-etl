image: python:3.11

definitions:
  services:
    docker:
      memory: 512
  steps:
    - step: &build-and-push-ecr
        name: Build & Push Docker Image to ECR
        services:
          - docker
        script:
          - pip install awscli
          - export AWS_REGION=${AWS_REGION:-af-south-1}
          - export ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          - export ECR_REPO=${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/solara-etl
          - export IMAGE_TAG=${BITBUCKET_COMMIT:0:7}
          
          - aws ecr get-login-password --region ${AWS_REGION} | docker login --username AWS --password-stdin ${ECR_REPO}
          - aws ecr create-repository --repository-name solara-etl --region ${AWS_REGION} 2>/dev/null || true
          - docker build -t ${ECR_REPO}:${IMAGE_TAG} -t ${ECR_REPO}:latest .
          - docker push ${ECR_REPO}:${IMAGE_TAG}
          - docker push ${ECR_REPO}:latest
          - echo "ECR_IMAGE=${ECR_REPO}:${IMAGE_TAG}" > build.env
        artifacts:
          - build.env

    - step: &verify-secrets
        name: Verify SSM Secrets
        script:
          - pip install awscli
          - export AWS_REGION=${AWS_REGION:-af-south-1}
          - aws ssm get-parameter --name /solara-etl/db-password --with-decryption --region ${AWS_REGION} >/dev/null 2>&1 || exit 1
          - aws ssm get-parameter --name /solara-etl/slack-bot-token --with-decryption --region ${AWS_REGION} >/dev/null 2>&1 || exit 1
          - echo "✓ Secrets verified"

    - step: &terraform-apply
        name: Deploy with Terraform
        script:
          - apt-get update && apt-get install -y unzip
          - pip install awscli
          - export AWS_REGION=${AWS_REGION:-af-south-1}
          
          - mkdir -p /etc/apt/keyrings
          - curl -fsSL https://apt.releases.hashicorp.com/gpg | gpg --dearmor -o /etc/apt/keyrings/hashicorp-archive-keyring.gpg
          - echo "deb [signed-by=/etc/apt/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | tee /etc/apt/sources.list.d/hashicorp.list
          - apt-get update && apt-get install terraform -y
          
          - cd terraform
          - |
            cat > backend_override.tf << EOF
            terraform {
              backend "s3" {
                bucket         = "${TF_STATE_BUCKET}"
                key            = "fargate/terraform.tfstate"
                region         = "${AWS_REGION}"
                encrypt        = true
                dynamodb_table = "terraform-locks"
              }
            }
            EOF
          
          - terraform init
          - source ../build.env
          - |
            terraform apply -auto-approve \
              -var "container_image=${ECR_IMAGE}" \
              -var "db_host=${DB_HOST}" \
              -var "db_user=${DB_USER}" \
              -var "db_password=${DB_PASSWORD}" \
              -var "slack_channel_id=${SLACK_CHANNEL_ID}" \
              -var "slack_bot_token=${SLACK_BOT_TOKEN}"
          
          - terraform output

pipelines:
  default:
    - step: *build-and-push-ecr
    - step: *verify-secrets

  branches:
    main:
      - step: *build-and-push-ecr
      - step: *verify-secrets
      - step: *terraform-apply
