image: python:3.13

pipelines:
  default:
    - step:
        name: Deploy ETL via SSM
        caches:
          - pip
        script:
          # Install AWS CLI v2
          - apt-get update && apt-get install -y unzip curl jq
          - curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          - unzip awscliv2.zip
          - ./aws/install
          - aws --version

          - export AWS_REGION=af-south-1

          - |
            aws ssm send-command \
              --targets "Key=InstanceIds,Values=$EC2_INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --comment "Deploy ETL, create .env, configure cron" \
              --region $AWS_REGION \
              --parameters 'commands=[
                "cd /home/ec2-user/etl_project",

                # Create virtual environment
                "python3.13 -m venv venv || echo venv exists",
                "source venv/bin/activate",
                "pip install --upgrade pip",
                "pip install -r requirements.txt",

                # Create .env with hardcoded values + password from repo variable
                "echo \"DB_HOST=solara.crqioqgga31u.af-south-1.rds.amazonaws.com\" > .env",
                "echo \"DB_PORT=5432\" >> .env",
                "echo \"DB_NAME=solara\" >> .env",
                "echo \"DB_USER=tableau\" >> .env",
                "echo \"DB_PASSWORD=$DB_PASSWORD\" >> .env",

                # Run ETL
                "python main.py",

                # Set cron
                "(crontab -l 2>/dev/null; echo \"0 6,12 * * * cd /home/ec2-user/etl_project && /home/ec2-user/etl_project/venv/bin/python main.py >> /home/ec2-user/etl_project/etl.log 2>&1\") | crontab -"
              ]' \
              --output json
