image: python:3.11

definitions:
  caches:
    pip: ~/.cache/pip
  services:
    docker:
      memory: 1024

pipelines:
  default:
    - step:
        name: Validate YAML & Build
        services:
          - docker
        caches:
          - pip
        script:
          - pip install pyyaml
          - python validate_yaml.py
          - echo "Building Docker image for Solara ETL..."
          - docker build -t solara-etl:$BITBUCKET_COMMIT .
          - docker image ls

    - step:
        name: Deploy to EC2 with Docker
        trigger: automatic
        script:
          - apt-get update && apt-get install -y rsync openssh-client
          - pip install awscli
          - export AWS_REGION=af-south-1

          # Setup SSH key from SSM
          - mkdir -p ~/.ssh
          - aws ssm get-parameter --name "/swordfish_etl/SSH_KEY_FILE" --with-decryption --query "Parameter.Value" --output text --region af-south-1 > ~/.ssh/ec2_key || true
          - |
            if [ ! -s ~/.ssh/ec2_key ]; then
              echo "Error: SSH key from SSM is empty. Cannot connect to EC2."
              exit 1
            fi
          - chmod 400 ~/.ssh/ec2_key

          # Create deployment script with Docker environment (passes Bitbucket variables)
          - |
            cat > deploy.sh <<SCRIPT
            #!/bin/bash
            set -e
            
            cd /home/ec2-user/etl_project
            
            # Pull latest code
            git pull origin main || true
            
            # Run Docker container with Bitbucket variables
            docker run --rm \
              -e DB_PASSWORD='${DB_PASSWORD}' \
              -e AWS_ACCESS_KEY_ID='${AWS_ACCESS_KEY_ID}' \
              -e AWS_SECRET_ACCESS_KEY='${AWS_SECRET_ACCESS_KEY}' \
              -e CLOUDWATCH_LOG_GROUP=/aws/ssm/solara-etl \
              -e CLOUDWATCH_LOG_STREAM=etl-pipeline \
              -v ~/.aws:/root/.aws:ro \
              solara-etl:latest
            SCRIPT
            chmod +x deploy.sh

          # Sync project files and deployment script to EC2
          - rsync -avz -e "ssh -i ~/.ssh/ec2_key -o StrictHostKeyChecking=no" --exclude='.git/' --exclude='.env' ./ ec2-user@${EC2_HOST}:/home/ec2-user/etl_project/
          - rsync -avz -e "ssh -i ~/.ssh/ec2_key -o StrictHostKeyChecking=no" deploy.sh ec2-user@${EC2_HOST}:/home/ec2-user/etl_project/

          # Execute deployment on EC2
          - ssh -i ~/.ssh/ec2_key -o StrictHostKeyChecking=no ec2-user@${EC2_HOST} "cd /home/ec2-user/etl_project && bash deploy.sh"
          - echo "Deployment to EC2 completed successfully!"

    - step:
        name: Deploy Infrastructure & Verify
        trigger: manual
        caches:
          - pip
        script:
          - pip install boto3 awscli
          - export AWS_REGION=af-south-1
          - python deploy_lambda.py deploy
          - echo "Waiting for CloudFormation stack to complete..."
          - aws cloudformation wait stack-create-complete --stack-name solara-etl-stack --region af-south-1 || aws cloudformation wait stack-update-complete --stack-name solara-etl-stack --region af-south-1
          - echo "Deployment successful!"
          - echo "Stack outputs:"
          - aws cloudformation describe-stacks --stack-name solara-etl-stack --region af-south-1 --query 'Stacks[0].Outputs' --output table
