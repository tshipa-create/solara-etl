image: python:3.13

pipelines:
  default:
    - step:
        name: Deploy Solara ETL with EventBridge + CloudWatch
        caches:
          - pip
        script:
          # Install system dependencies
          - apt-get update && apt-get install -y curl unzip jq

          # Install AWS CLI v2
          - curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          - unzip awscliv2.zip
          - ./aws/install
          - export PATH=$PATH:/usr/local/bin

          # Export AWS credentials and region (set these as Bitbucket repository or pipeline variables)
          - export AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
          - export AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
          - export AWS_REGION=af-south-1

          # Create .env file securely
          - echo "DB_HOST=solara.crqioqgga31u.af-south-1.rds.amazonaws.com" > .env
          - echo "DB_PORT=5432" >> .env
          - echo "DB_NAME=solara" >> .env
          - echo "DB_USER=tableau" >> .env
          - echo "DB_PASSWORD=${DB_PASSWORD}" >> .env

          # Sync code to EC2
          - mkdir -p ~/.ssh
          - aws ssm get-parameter --name "/swordfish_etl/SSH_KEY_FILE" --with-decryption --query "Parameter.Value" --output text --region af-south-1 > ~/.ssh/ec2_key || true
          - chmod 600 ~/.ssh/ec2_key
          - rsync -avz -e "ssh -i ~/.ssh/ec2_key -o StrictHostKeyChecking=no" ./ ec2-user@${EC2_HOST}:/home/ec2-user/etl_project || echo "Note: EC2 sync may fail if keys not configured in SSM"

          # Install Python dependencies for deployment script
          - pip install --no-cache-dir boto3

          # Deploy CloudFormation stack (EventBridge + CloudWatch + SSM)
          - export EC2_INSTANCE_ID=${EC2_INSTANCE_ID:-}
          - python deploy_lambda.py deploy

          # Wait for stack to complete
          - echo "Waiting for CloudFormation stack to complete..."
          - aws cloudformation wait stack-create-complete --stack-name solara-etl-stack --region af-south-1 || aws cloudformation wait stack-update-complete --stack-name solara-etl-stack --region af-south-1

          # Test EventBridge rule by triggering SSM command manually
          - echo "Testing EventBridge rule (triggering manual SSM command)..."
          - EC2_ID=$(aws cloudformation describe-stacks --stack-name solara-etl-stack --region af-south-1 --query 'Stacks[0].Outputs[?OutputKey==`EC2InstanceId`].OutputValue' --output text)
          - echo "EC2 Instance ID: $EC2_ID"

          # Retrieve stack outputs
          - echo ""
          - echo "Deployment successful!"
          - echo "Stack outputs:"
          - aws cloudformation describe-stacks --stack-name solara-etl-stack --region af-south-1 --query 'Stacks[0].Outputs' --output table
          
          - echo ""
          - echo "CloudWatch Logs will be available at:"
          - echo "  Group: /aws/ssm/solara-etl"
